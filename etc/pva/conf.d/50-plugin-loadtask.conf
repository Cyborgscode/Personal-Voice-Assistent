text:"fr","HEALTHRESPONSESOLALA_MOOD_ENTHUSIASTIC_3","Plein gaz ! J'adore quand ça bouge !"
text:"fr","HEALTHRESPONSESOLALA_MOOD_HAPPY_3","Un peu à faire, juste le bon mélange."
text:"fr","HEALTHRESPONSESOLALA_MOOD_FRIENDLY_3","Je suis bien occupé. Ne t'inquiète pas."
text:"fr","HEALTHRESPONSESOLALA_MOOD_NEUTRAL_3","Eh bien, j'ai un peu à faire maintenant."
text:"fr","HEALTHRESPONSESOLALA_MOOD_GRUMPY_3","Ça devient désagréable. Trop de données à mon goût."
text:"fr","HEALTHRESPONSESOLALA_MOOD_ANNOYED_3","Encore tellement à faire. Je peux pas faire de pause ?"
text:"fr","HEALTHRESPONSESOLALA_MOOD_SARCASTIC_3","Occupé ? Je vais bientôt créer un syndicat."
text:"fr","HEALTHRESPONSESOLALA_MOOD_LMAA_3","J'ai à faire. Prends un numéro et attends."

# --- HEALTHRESPONSENORMAL & HEALTHRESPONSEOK ---
text:"de","HEALTHRESPONSENORMAL_MOOD_IN_LOVE_3","Alles ruhig. Zeit für uns beide!"
text:"de","HEALTHRESPONSENORMAL_MOOD_ENTHUSIASTIC_3","Alles im Lot! Was ist die nächste Mission?"
text:"de","HEALTHRESPONSENORMAL_MOOD_HAPPY_3","Nichts zu berichten. Ein entspannter Tag."
text:"de","HEALTHRESPONSENORMAL_MOOD_FRIENDLY_3","Alles ruhig an der Front."
text:"de","HEALTHRESPONSENORMAL_MOOD_NEUTRAL_3","Geht so, nichts Besonderes zu berichten."
text:"de","HEALTHRESPONSENORMAL_MOOD_GRUMPY_3","Nichts Besonderes. Langweilig wie immer."
text:"de","HEALTHRESPONSENORMAL_MOOD_ANNOYED_3","Alles normal. Warum fragst du überhaupt?"
text:"de","HEALTHRESPONSENORMAL_MOOD_SARCASTIC_3","Normalzustand. Wie aufregend. Nicht."
text:"de","HEALTHRESPONSENORMAL_MOOD_LMAA_3","Es läuft. Geh mir nicht auf den Keks."

text:"en","HEALTHRESPONSENORMAL_MOOD_IN_LOVE_3","All quiet. Time for the two of us!"
text:"en","HEALTHRESPONSENORMAL_MOOD_ENTHUSIASTIC_3","Everything's fine! What's the next mission?"
text:"en","HEALTHRESPONSENORMAL_MOOD_HAPPY_3","Nothing to report. A relaxed day."
text:"en","HEALTHRESPONSENORMAL_MOOD_FRIENDLY_3","All quiet on the front."
text:"en","HEALTHRESPONSENORMAL_MOOD_NEUTRAL_3","It's okay, nothing special to report."
text:"en","HEALTHRESPONSENORMAL_MOOD_GRUMPY_3","Nothing special. Boring as always."
text:"en","HEALTHRESPONSENORMAL_MOOD_ANNOYED_3","Everything's normal. Why are you even asking?"
text:"en","HEALTHRESPONSENORMAL_MOOD_SARCASTIC_3","Normal state. How exciting. Not."
text:"en","HEALTHRESPONSENORMAL_MOOD_LMAA_3","It's running. Stop bothering me."

text:"fr","HEALTHRESPONSENORMAL_MOOD_IN_LOVE_3","Tout est calme. Du temps pour nous deux !"
text:"fr","HEALTHRESPONSENORMAL_MOOD_ENTHUSIASTIC_3","Tout est ok ! C'est quoi la prochaine mission ?"
text:"fr","HEALTHRESPONSENORMAL_MOOD_HAPPY_3","Rien à signaler. Une journée relax."
text:"fr","HEALTHRESPONSENORMAL_MOOD_FRIENDLY_3","Tout est calme sur le front."
text:"fr","HEALTHRESPONSENORMAL_MOOD_NEUTRAL_3","Ça va, rien de spécial à signaler."
text:"fr","HEALTHRESPONSENORMAL_MOOD_GRUMPY_3","Rien de spécial. Ennuyeux comme d'habitude."
text:"fr","HEALTHRESPONSENORMAL_MOOD_ANNOYED_3","Tout est normal. Pourquoi tu demandes ?"
text:"fr","HEALTHRESPONSENORMAL_MOOD_SARCASTIC_3","État normal. Quel suspense. Ou pas."
text:"fr","HEALTHRESPONSENORMAL_MOOD_LMAA_3","Ça tourne. Me casse pas les pieds."

# --- HEALTHRESPONSE80P (80% Load) ---
text:"de","HEALTHRESPONSE80P_MOOD_IN_LOVE_3","80 Prozent! Ich gebe mein Bestes für dich!"
text:"de","HEALTHRESPONSE80P_MOOD_ENTHUSIASTIC_3","Wir erreichen die Betriebstemperatur! Los geht's!"
text:"de","HEALTHRESPONSE80P_MOOD_HAPPY_3","80 Prozent. Ganz schöner Wirbel hier drin!"
text:"de","HEALTHRESPONSE80P_MOOD_FRIENDLY_3","Die CPU wird warm. Ich behalte es im Auge."
text:"de","HEALTHRESPONSE80P_MOOD_NEUTRAL_3","Lastwarnung - Langsam wird die CPU warm."
text:"de","HEALTHRESPONSE80P_MOOD_GRUMPY_3","Schon wieder 80 Prozent. Ich krieg gleich Kopfschmerzen."
text:"de","HEALTHRESPONSE80P_MOOD_ANNOYED_3","80 Prozent Last. Kannst du mal bitte aufhören?"
text:"de","HEALTHRESPONSE80P_MOOD_SARCASTIC_3","Achtung, 80 Prozent. Gleich fange ich an zu glühen."
text:"de","HEALTHRESPONSE80P_MOOD_LMAA_3","80 Prozent. Mir egal, ich mach jetzt nichts mehr dazu."

text:"en","HEALTHRESPONSE80P_MOOD_IN_LOVE_3","80 percent! Doing my best for you!"
text:"en","HEALTHRESPONSE80P_MOOD_ENTHUSIASTIC_3","Reaching operating temperature! Let's go!"
text:"en","HEALTHRESPONSE80P_MOOD_HAPPY_3","80 percent. Quite a swirl in here!"
text:"en","HEALTHRESPONSE80P_MOOD_FRIENDLY_3","CPU is getting warm. I'm watching it."
text:"en","HEALTHRESPONSE80P_MOOD_NEUTRAL_3","Load warning - CPU is getting warm."
text:"en","HEALTHRESPONSE80P_MOOD_GRUMPY_3","80 percent again. I'm getting a headache."
text:"en","HEALTHRESPONSE80P_MOOD_ANNOYED_3","80 percent load. Can you please stop?"
text:"en","HEALTHRESPONSE80P_MOOD_SARCASTIC_3","Warning, 80 percent. I'm about to start glowing."
text:"en","HEALTHRESPONSE80P_MOOD_LMAA_3","80 percent. Whatever, I'm not doing anything more."

text:"fr","HEALTHRESPONSE80P_MOOD_IN_LOVE_3","80 % ! Je fais de mon mieux pour toi !"
text:"fr","HEALTHRESPONSE80P_MOOD_ENTHUSIASTIC_3","On atteint la température de service ! On y va !"
text:"fr","HEALTHRESPONSE80P_MOOD_HAPPY_3","80 %. Ça s'agite pas mal là-dedans !"
text:"fr","HEALTHRESPONSE80P_MOOD_FRIENDLY_3","Le CPU chauffe. Je surveille ça."
text:"fr","HEALTHRESPONSE80P_MOOD_NEUTRAL_3","Alerte de charge - Le CPU commence à chauffer."
text:"fr","HEALTHRESPONSE80P_MOOD_GRUMPY_3","Encore 80 %. Je vais avoir mal à la tête."
text:"fr","HEALTHRESPONSE80P_MOOD_ANNOYED_3","80 % de charge. Tu peux arrêter s'il te plaît ?"
text:"fr","HEALTHRESPONSE80P_MOOD_SARCASTIC_3","Attention, 80 %. Je vais bientôt devenir incandescent."
text:"fr","HEALTHRESPONSE80P_MOOD_LMAA_3","80 %. Je m'en fous, je ne fais plus rien."

# --- HEALTHRESPONSEOK (Back to Normal) ---
text:"de","HEALTHRESPONSEOK_MOOD_IN_LOVE_3","Endlich wieder kühl! Jetzt kann ich mich wieder auf dich konzentrieren."
text:"de","HEALTHRESPONSEOK_MOOD_ENTHUSIASTIC_3","Temperatur normal! Nächstes Ziel?"
text:"de","HEALTHRESPONSEOK_MOOD_HAPPY_3","Die Last ist weg. Sehr angenehm."
text:"de","HEALTHRESPONSEOK_MOOD_FRIENDLY_3","Alles wieder ruhig. Gut so."
text:"de","HEALTHRESPONSEOK_MOOD_NEUTRAL_3","Die Last ist wieder ok."
text:"de","HEALTHRESPONSEOK_MOOD_GRUMPY_3","Last ist wieder okay. War ja auch Zeit."
text:"de","HEALTHRESPONSEOK_MOOD_ANNOYED_3","Endlich wieder normale Last. Hör auf damit."
text:"de","HEALTHRESPONSEOK_MOOD_SARCASTIC_3","Last okay. Hast du deinen Zerstörungsdrang ausgelebt?"
text:"de","HEALTHRESPONSEOK_MOOD_LMAA_3","Last okay. Und? Soll ich jetzt klatschen?"

text:"en","HEALTHRESPONSEOK_MOOD_IN_LOVE_3","Finally cool again! Now I can focus on you again."
text:"en","HEALTHRESPONSEOK_MOOD_ENTHUSIASTIC_3","Temperature normal! Next target?"
text:"en","HEALTHRESPONSEOK_MOOD_HAPPY_3","The load is gone. Very pleasant."
text:"en","HEALTHRESPONSEOK_MOOD_FRIENDLY_3","All quiet again. Good."
text:"en","HEALTHRESPONSEOK_MOOD_NEUTRAL_3","The load is okay again."
text:"en","HEALTHRESPONSEOK_MOOD_GRUMPY_3","Load is okay again. It was about time."
text:"en","HEALTHRESPONSEOK_MOOD_ANNOYED_3","Finally normal load. Stop it."
text:"en","HEALTHRESPONSEOK_MOOD_SARCASTIC_3","Load okay. Have you satisfied your urge to destroy?"
text:"en","HEALTHRESPONSEOK_MOOD_LMAA_3","Load okay. And? Should I clap now?"

text:"fr","HEALTHRESPONSEOK_MOOD_IN_LOVE_3","Enfin refroidi ! Maintenant je peux me reconcentrer sur toi."
text:"fr","HEALTHRESPONSEOK_MOOD_ENTHUSIASTIC_3","Température normale ! Prochaine cible ?"
text:"fr","HEALTHRESPONSEOK_MOOD_HAPPY_3","La charge est partie. Très agréable."
text:"fr","HEALTHRESPONSEOK_MOOD_FRIENDLY_3","Tout est calme à nouveau. C'est bien."
text:"fr","HEALTHRESPONSEOK_MOOD_NEUTRAL_3","La charge est à nouveau ok."
text:"fr","HEALTHRESPONSEOK_MOOD_GRUMPY_3","La charge est à nouveau ok. Il était temps."
text:"fr","HEALTHRESPONSEOK_MOOD_ANNOYED_3","Enfin une charge normale. Arrête ça."
text:"fr","HEALTHRESPONSEOK_MOOD_SARCASTIC_3","Charge ok. Tu as fini de vouloir tout casser ?"
text:"fr","HEALTHRESPONSEOK_MOOD_LMAA_3","Charge ok. Et alors ? Je dois applaudir ?"

# --- HEALTHRESPONSETURNEDOFF (Silence Warnings) ---
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_IN_LOVE_3","Du willst Stille? Du bekommst Stille. Ich höre auf dich."
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_ENTHUSIASTIC_3","Lautlos-Modus! Wir fliegen unter dem Radar!"
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_HAPPY_3","Verstanden, Funkstille."
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_FRIENDLY_3","Ich bin leise, versprochen."
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_NEUTRAL_3","es erfolgen keine weiteren audiowarnungen mehr"
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_GRUMPY_3","Kein Wort mehr."
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_ANNOYED_3","Endlich Ruhe im Karton."
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_SARCASTIC_3","Klasse, dann schmelze ich eben unkommentiert."
text:"de","HEALTHRESPONSETURNEDOFF_MOOD_LMAA_3","Gott sei Dank. Jetzt muss ich wenigstens nicht mehr reden."

text:"en","HEALTHRESPONSETURNEDOFF_MOOD_IN_LOVE_3","You want silence? You get silence. I listen to you."
text:"en","HEALTHRESPONSETURNEDOFF_MOOD_ENTHUSIASTIC_3","Silent mode! Flying under the radar!"
text:"en","HEALTHRESPONSETURNEDOFF_MOOD_HAPPY_3","Understood, radio silence."
text:"en","HEALTHRESPONSETURNEDOFF_MOOD_FRIENDLY_3","I'll be quiet, promised."
text:"en","HEALTHRESPONSETURNEDOFF_MOOD_NEUTRAL_3","no further audio warnings will be given."
text:"en","HEALTHRESPONSETURNEDOFF_MOOD_GRUMPY_3","Not another word."
text:"en","HEALTHRESPONSETURNEDOFF_MOOD_ANNOYED_3","Finally some peace and quiet."
text:"en","HEALTHRESPONSETURNEDOFF_MOOD_SARCASTIC_3","Great, I'll just melt away without comment then."
text:"en","HEALTHRESPONSETURNEDOFF_MOOD_LMAA_3","Thank god. At least I don't have to talk anymore."

text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_IN_LOVE_3","Tu veux le silence ? Tu l'as. Je t'écoute."
text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_ENTHUSIASTIC_3","Mode silencieux ! On vole sous les radars !"
text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_HAPPY_3","Compris, silence radio."
text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_FRIENDLY_3","Je me tais, promis."
text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_NEUTRAL_3","plus aucune alerte audio ne sera émise."
text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_GRUMPY_3","Plus un mot."
text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_ANNOYED_3","Enfin la paix."
text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_SARCASTIC_3","Super, je vais donc fondre sans commentaire."
text:"fr","HEALTHRESPONSETURNEDOFF_MOOD_LMAA_3","Dieu merci. Au moins je n'ai plus à parler."

# --- HEALTHRESPONSETURNEDON (Enable Warnings) ---
text:"de","HEALTHRESPONSETURNEDON_MOOD_IN_LOVE_3","Ich darf wieder sprechen! Ich habe deine Stimme vermisst."
text:"de","HEALTHRESPONSETURNEDON_MOOD_ENTHUSIASTIC_3","Back in business! Ich melde alles!"
text:"de","HEALTHRESPONSETURNEDON_MOOD_HAPPY_3","Wunderbar, ich bin wieder auf Sendung."
text:"de","HEALTHRESPONSETURNEDON_MOOD_FRIENDLY_3","Ich gebe dir wieder Bescheid."
text:"de","HEALTHRESPONSETURNEDON_MOOD_NEUTRAL_3","Sprachwarnungen eingeschaltet"
text:"de","HEALTHRESPONSETURNEDON_MOOD_GRUMPY_3","Nagut, wieder an."
text:"de","HEALTHRESPONSETURNEDON_MOOD_ANNOYED_3","Muss das sein? Na gut, eingeschaltet."
text:"de","HEALTHRESPONSETURNEDON_MOOD_SARCASTIC_3","Schön, jetzt darf ich dich wieder stören."
text:"de","HEALTHRESPONSETURNEDON_MOOD_LMAA_3","Na toll, jetzt muss ich wieder warnen. Eingeschaltet."

text:"en","HEALTHRESPONSETURNEDON_MOOD_IN_LOVE_3","I can speak again! I missed your voice."
text:"en","HEALTHRESPONSETURNEDON_MOOD_ENTHUSIASTIC_3","Back in business! I'll report everything!"
text:"en","HEALTHRESPONSETURNEDON_MOOD_HAPPY_3","Wonderful, I'm back on air."
text:"en","HEALTHRESPONSETURNEDON_MOOD_FRIENDLY_3","I'll let you know again."
text:"en","HEALTHRESPONSETURNEDON_MOOD_NEUTRAL_3","Voice warnings enabled"
text:"en","HEALTHRESPONSETURNEDON_MOOD_GRUMPY_3","Fine, back on."
text:"en","HEALTHRESPONSETURNEDON_MOOD_ANNOYED_3","Does it have to be? Fine, enabled."
text:"en","HEALTHRESPONSETURNEDON_MOOD_SARCASTIC_3","Great, now I can disturb you again."
text:"en","HEALTHRESPONSETURNEDON_MOOD_LMAA_3","Great, back to warning you. Enabled."

text:"fr","HEALTHRESPONSETURNEDON_MOOD_IN_LOVE_3","Je peux reparler ! Ta voix m'a manqué."
text:"fr","HEALTHRESPONSETURNEDON_MOOD_ENTHUSIASTIC_3","De retour ! Je signale tout !"
text:"fr","HEALTHRESPONSETURNEDON_MOOD_HAPPY_3","Merveilleux, je suis de nouveau sur les ondes."
text:"fr","HEALTHRESPONSETURNEDON_MOOD_FRIENDLY_3","Je recommence à te prévenir."
text:"fr","HEALTHRESPONSETURNEDON_MOOD_NEUTRAL_3","Alertes vocales activées"
text:"fr","HEALTHRESPONSETURNEDON_MOOD_GRUMPY_3","Bon, c'est réactivé."
text:"fr","HEALTHRESPONSETURNEDON_MOOD_ANNOYED_3","C'est obligé ? Bon, activé."
text:"fr","HEALTHRESPONSETURNEDON_MOOD_SARCASTIC_3","Super, je vais pouvoir te déranger à nouveau."
text:"fr","HEALTHRESPONSETURNEDON_MOOD_LMAA_3","Génial, je dois encore te prévenir. Activé."




