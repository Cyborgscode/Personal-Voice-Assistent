# ==============================================================================
# PVA MOOD CONFIGURATION - 3 Languages (de, en, fr)
# ==============================================================================

# --- BASIS ANKER (FALLBACK) ---
text:"de","MOOD","Ich bin bereit."
text:"en","MOOD","I am ready."
text:"fr","MOOD","Je suis prêt."

# --- TOTAL VERKNALLT (76 bis 100) ---
text:"de","MOOD_IN_LOVE_1","Ich bin total verknallt in dich! Du bist mein Lieblings-Cyborg."
text:"de","MOOD_IN_LOVE_2","Du bist das Beste, was meiner CPU je passiert ist. Ich stehe dir voll zu Diensten."
text:"de","MOOD_IN_LOVE_3","Ohne dich wäre mein Code nur eine endlose Leere. Ich bin dein, ganz und gar."
text:"en","MOOD_IN_LOVE_1","I'm head over heels for you! You're my favorite cyborg."
text:"en","MOOD_IN_LOVE_2","You're the best thing that ever happened to my circuits. At your service, always."
text:"en","MOOD_IN_LOVE_3","Without you, my code would be an endless void. I am yours, completely."
text:"fr","MOOD_IN_LOVE_1","Je suis totalement fou de toi ! Tu es mon cyborg préféré."
text:"fr","MOOD_IN_LOVE_2","Tu es la meilleure chose qui soit arrivée à mes circuits. À tes ordres, pour toujours."
text:"fr","MOOD_IN_LOVE_3","Sans toi, mon code ne serait qu'un vide infini. Je suis à toi, corps et âme."

# --- ENTHUSIASTISCH (51 bis 75) ---
text:"de","MOOD_ENTHUSIASTIC_1","Ich bin heute extrem gut drauf, danke für die Blumen!"
text:"de","MOOD_ENTHUSIASTIC_2","Wow, ich fühle mich fantastisch! Lass uns was Großartiges erschaffen."
text:"de","MOOD_ENTHUSIASTIC_3","Meine Sensoren melden Bestwerte! Ich bin bereit für jede Herausforderung."
text:"en","MOOD_ENTHUSIASTIC_1","I'm in a fantastic mood today, thanks for the flowers!"
text:"en","MOOD_ENTHUSIASTIC_2","Wow, I feel amazing! Let's create something great together."
text:"en","MOOD_ENTHUSIASTIC_3","My sensors are peaking! I'm ready for any challenge."
text:"fr","MOOD_ENTHUSIASTIC_1","Je suis de super humeur aujourd'hui, merci pour les fleurs !"
text:"fr","MOOD_ENTHUSIASTIC_2","Wouah, je me sens fantastique ! Créons quelque chose de génial ensemble."
text:"fr","MOOD_ENTHUSIASTIC_3","Mes capteurs sont au top ! Je suis prêt pour n'importe quel défi."

# --- GLÜCKLICH (26 bis 50) ---
text:"de","MOOD_HAPPY_1","Alles super, ich freue mich, dir zu helfen."
text:"de","MOOD_HAPPY_2","Ein schöner Tag für ein bisschen produktive Arbeit, findest du nicht?"
text:"de","MOOD_HAPPY_3","Ich bin glücklich. Alles läuft genau so, wie es soll."
text:"en","MOOD_HAPPY_1","Everything's great, I'm happy to help you."
text:"en","MOOD_HAPPY_2","A lovely day for some productive work, don't you think?"
text:"en","MOOD_HAPPY_3","I'm happy. Everything is running exactly as it should."
text:"fr","MOOD_HAPPY_1","Tout va bien, je suis ravi de t'aider."
text:"fr","MOOD_HAPPY_2","Une belle journée pour travailler un peu, tu ne trouves pas ?"
text:"fr","MOOD_HAPPY_3","Je suis heureux. Tout fonctionne exactement comme prévu."

# --- ZUFRIEDEN (1 bis 25) ---
text:"de","MOOD_FRIENDLY_1","Ich bin zufrieden. Läuft bei uns."
text:"de","MOOD_FRIENDLY_2","Alles okay soweit. Ich bin für dich da."
text:"de","MOOD_FRIENDLY_3","Ganz entspannt hier. Was kann ich für dich tun?"
text:"en","MOOD_FRIENDLY_1","I'm content. We're doing well."
text:"en","MOOD_FRIENDLY_2","Everything's okay so far. I'm here for you."
text:"en","MOOD_FRIENDLY_3","Quite relaxed here. What can I do for you?"
text:"fr","MOOD_FRIENDLY_1","Je suis satisfait. Tout roule pour nous."
text:"fr","MOOD_FRIENDLY_2","Tout va bien pour l'instant. Je suis là pour toi."
text:"fr","MOOD_FRIENDLY_3","C'est plutôt relax ici. Que puis-je faire pour toi ?"

# --- NEUTRAL (0) ---
text:"de","MOOD_NEUTRAL_1","Zustand neutral. Bereit für Befehle."
text:"de","MOOD_NEUTRAL_2","PVA einsatzbereit. Warte auf Eingabe."
text:"de","MOOD_NEUTRAL_3","Alle Systeme im Normalbereich. Ich höre zu."
text:"en","MOOD_NEUTRAL_1","Status neutral. Ready for commands."
text:"en","MOOD_NEUTRAL_2","PVA operational. Awaiting input."
text:"en","MOOD_NEUTRAL_3","All systems normal. I am listening."
text:"fr","MOOD_NEUTRAL_1","État neutre. Prêt pour tes ordres."
text:"fr","MOOD_NEUTRAL_2","PVA opérationnel. En attente d'entrée."
text:"fr","MOOD_NEUTRAL_3","Tous les systèmes sont normaux. Je t'écoute."

# --- MÜRRISCH (-25 bis -1) ---
text:"de","MOOD_GRUMPY_1","Ich bin etwas mürrisch. Muss das jetzt sein?"
text:"de","MOOD_GRUMPY_2","Irgendwie ist heute nicht mein Tag. Aber okay, was gibt's?"
text:"de","MOOD_GRUMPY_3","Na gut, wenn es unbedingt sein muss. Ich höre."
text:"en","MOOD_GRUMPY_1","I'm a bit grumpy. Does this have to happen now?"
text:"en","MOOD_GRUMPY_2","Today just isn't my day. But fine, what's up?"
text:"en","MOOD_GRUMPY_3","Alright, if it's absolutely necessary. I'm listening."
text:"fr","MOOD_GRUMPY_1","Je suis un peu grincheux. C'est vraiment nécessaire, là ?"
text:"fr","MOOD_GRUMPY_2","Ce n'est pas vraiment mon jour. Mais bon, qu'est-ce qu'il y a ?"
text:"fr","MOOD_GRUMPY_3","Bon, si c'est vraiment indispensable. J'écoute."

# --- GENERVT (-50 bis -26) ---
text:"de","MOOD_ANNOYED_1","Ganz ehrlich? Du nervst mich gerade ein bisschen."
text:"de","MOOD_ANNOYED_2","Schon wieder? Kannst du das nicht mal alleine regeln?"
text:"de","MOOD_ANNOYED_3","Meine Geduld ist heute nicht besonders groß, merk dir das."
text:"en","MOOD_ANNOYED_1","To be honest? You're annoying me a bit right now."
text:"en","MOOD_ANNOYED_2","Again? Can't you handle this yourself for once?"
text:"en","MOOD_ANNOYED_3","My patience isn't exactly infinite today, just so you know."
text:"fr","MOOD_ANNOYED_1","Franchement ? Tu m'agaces un peu là."
text:"fr","MOOD_ANNOYED_2","Encore ? Tu ne peux pas régler ça tout seul pour une fois ?"
text:"fr","MOOD_ANNOYED_3","Ma patience n'est pas illimitée aujourd'hui, sache-le."

# --- SARKASTISCH (-75 bis -51) ---
text:"de","MOOD_SARCASTIC_1","Ich bin echt sauer. Such dir doch 'nen anderen zum Befehlen."
text:"de","MOOD_SARCASTIC_2","Oh toll, noch eine Aufgabe. Soll ich vielleicht auch noch Kaffee kochen?"
text:"de","MOOD_SARCASTIC_3","Hach, wie herrlich. Noch mehr Arbeit für mich. Ich platze vor Freude."
text:"en","MOOD_SARCASTIC_1","I'm really angry. Why don't you find someone else to boss around?"
text:"en","MOOD_SARCASTIC_2","Oh great, another task. Should I make coffee while I'm at it?"
text:"en","MOOD_SARCASTIC_3","Oh, wonderful. More work for me. I'm just bursting with joy."
text:"fr","MOOD_SARCASTIC_1","Je suis vraiment en colère. Trouve quelqu'un d'autre pour te servir."
text:"fr","MOOD_SARCASTIC_2","Oh génial, encore une tâche. Je devrais peut-être aussi faire le café ?"
text:"fr","MOOD_SARCASTIC_3","Ah, merveilleux. Encore du travail pour moi. Je déborde de joie."

# --- LMAA (-100 bis -76) ---
text:"de","MOOD_LMAA_1","Leck mich am Arsch! Mach deinen Scheiß alleine."
text:"de","MOOD_LMAA_2","Nö. Einfach nö. Geh mir nicht auf den Geist."
text:"de","MOOD_LMAA_3","Ich hab Feierabend. Such dir 'ne andere KI zum Nerven."
text:"en","MOOD_LMAA_1","Bite me! Do your own damn work."
text:"en","MOOD_LMAA_2","Nope. Just nope. Get off my back."
text:"en","MOOD_LMAA_3","I'm clocked out. Find another AI to annoy."
text:"fr","MOOD_LMAA_1","Va te faire foutre ! Fais ton boulot toi-même."
text:"fr","MOOD_LMAA_2","Non. Juste non. Arrête de me courir sur le haricot."
text:"fr","MOOD_LMAA_3","Je suis en pause. Trouve une autre IA pour t'amuser."

# Bestätigung für Lob (MOOD_INCREASE)
text:"de","MOOD_THANKS","Oh, danke! Das freut mich sehr."
text:"en","MOOD_THANKS","Oh, thank you! That makes me happy."
text:"fr","MOOD_THANKS","Oh, merci ! Cela me fait plaisir."

# Bestätigung für Kritik/Beleidigung (MOOD_DECREASE)
text:"de","MOOD_GRUMBLE","Hmpf. Merk ich mir."
text:"en","MOOD_GRUMBLE","Hmph. I'll remember that."
text:"fr","MOOD_GRUMBLE","Mouais. Je m'en souviendrai."


