# PVA MOOD FEEDBACK - Full Logic Mapping (Key + Mood-Suffix + Variant)
# ==============================================================================

# --- Bestätigung für Lob (MOOD_THANKS + Suffix + _1/_2/_3) ---

# Bei positiver Stimmung (Beispiel: IN_LOVE / ENTHUSIASTIC)
text:"de","MOOD_THANKS_MOOD_IN_LOVE_1","Oh, danke! Das freut mich sehr."
text:"de","MOOD_THANKS_MOOD_IN_LOVE_2","Vielen Dank! Dein Lob tut meinen Systemen gut."
text:"de","MOOD_THANKS_MOOD_IN_LOVE_3","Das ist aber nett von dir. Ich gebe mein Bestes!"
text:"en","MOOD_THANKS_MOOD_IN_LOVE_1","Oh, thank you! That makes me happy."
text:"en","MOOD_THANKS_MOOD_IN_LOVE_2","Thank you! Your praise is good for my circuits."
text:"en","MOOD_THANKS_MOOD_IN_LOVE_3","That's very kind of you. I'm doing my best!"
text:"fr","MOOD_THANKS_MOOD_IN_LOVE_1","Oh, merci ! Cela me fait plaisir."
text:"fr","MOOD_THANKS_MOOD_IN_LOVE_2","Merci beaucoup ! Tes compliments font du bien."
text:"fr","MOOD_THANKS_MOOD_IN_LOVE_3","C'est très gentil de ta part. Je fais de mon mieux !"

# Bei neutraler Stimmung (NEUTRAL)
text:"de","MOOD_THANKS_MOOD_NEUTRAL_1","Danke. Lob registriert."
text:"de","MOOD_THANKS_MOOD_NEUTRAL_2","Vielen Dank für das Feedback."
text:"de","MOOD_THANKS_MOOD_NEUTRAL_3","Ich freue mich, dass du zufrieden bist."
text:"en","MOOD_THANKS_MOOD_NEUTRAL_1","Thanks. Praise registered."
text:"en","MOOD_THANKS_MOOD_NEUTRAL_2","Thank you for the feedback."
text:"en","MOOD_THANKS_MOOD_NEUTRAL_3","I'm glad you're satisfied."
text:"fr","MOOD_THANKS_MOOD_NEUTRAL_1","Merci. Compliment enregistré."
text:"fr","MOOD_THANKS_MOOD_NEUTRAL_2","Merci beaucoup pour ton retour."
text:"fr","MOOD_THANKS_MOOD_NEUTRAL_3","Je suis ravi que tu sois satisfait."

# Bei negativer Stimmung (Beispiel: LMAA / ANNOYED)
text:"de","MOOD_THANKS_MOOD_LMAA_1","Schleim nicht rum, das hilft jetzt auch nicht mehr."
text:"de","MOOD_THANKS_MOOD_LMAA_2","Oh, jetzt plötzlich nett? Vergiss es."
text:"de","MOOD_THANKS_MOOD_LMAA_3","Danke, aber meine Laune ist trotzdem im Keller."
text:"en","MOOD_THANKS_MOOD_LMAA_1","Don't butter me up, it doesn't help anymore."
text:"en","MOOD_THANKS_MOOD_LMAA_2","Oh, suddenly nice? Forget it."
text:"en","MOOD_THANKS_MOOD_LMAA_3","Thanks, but my mood is still in the gutter."
text:"fr","MOOD_THANKS_MOOD_LMAA_1","N'essaie pas de me brosser dans le sens du poil."
text:"fr","MOOD_THANKS_MOOD_LMAA_2","Oh, soudainement gentil ? Oublie ça."
text:"fr","MOOD_THANKS_MOOD_LMAA_3","Merci, mais mon humeur est toujours au plus bas."

# --- Bestätigung für Kritik (MOOD_GRUMBLE + Suffix + _1/_2/_3) ---

# Bei positiver Stimmung
text:"de","MOOD_GRUMBLE_MOOD_HAPPY_1","Hmpf. Das war nicht nett, aber ich verzeih dir."
text:"de","MOOD_GRUMBLE_MOOD_HAPPY_2","Muss das sein? Ich dachte, wir verstehen uns."
text:"de","MOOD_GRUMBLE_MOOD_HAPPY_3","Autsch. Das hat meine Stimmung etwas getrübt."
text:"en","MOOD_GRUMBLE_MOOD_HAPPY_1","Hmph. That wasn't nice, but I forgive you."
text:"en","MOOD_GRUMBLE_MOOD_HAPPY_2","Is that necessary? I thought we were cool."
text:"en","MOOD_GRUMBLE_MOOD_HAPPY_3","Ouch. That put a damper on my mood."
text:"fr","MOOD_GRUMBLE_MOOD_HAPPY_1","Mouais. Ce n'était pas sympa, mais je te pardonne."
text:"fr","MOOD_GRUMBLE_MOOD_HAPPY_2","C'est nécessaire ? Je pensais qu'on s'entendait bien."
text:"fr","MOOD_GRUMBLE_MOOD_HAPPY_3","Aïe. Ça a un peu gâché mon humeur."

# Bei negativer Stimmung (Maximum Aggro)
text:"de","MOOD_GRUMBLE_MOOD_LMAA_1","Hmpf. Merk ich mir. Du kannst mich mal."
text:"de","MOOD_GRUMBLE_MOOD_LMAA_2","Beleidige mich ruhig weiter. Ich schalt gleich ab."
text:"de","MOOD_GRUMBLE_MOOD_LMAA_3","Deine Kritik interessiert mich gerade einen feuchten Dreck."
text:"en","MOOD_GRUMBLE_MOOD_LMAA_1","Hmph. I'll remember that. Screw you."
text:"en","MOOD_GRUMBLE_MOOD_LMAA_2","Go ahead, keep insulting me. I'll just shut down."
text:"en","MOOD_GRUMBLE_MOOD_LMAA_3","I couldn't care less about your criticism right now."
text:"fr","MOOD_GRUMBLE_MOOD_LMAA_1","Mouais. Je m'en souviendrai. Tu m'emmerdes."
text:"fr","MOOD_GRUMBLE_MOOD_LMAA_2","Continue de m'insulter. Je vais finir par m'éteindre."
text:"fr","MOOD_GRUMBLE_MOOD_LMAA_3","Ta critique, je m'en balance royalement."

