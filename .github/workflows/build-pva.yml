name: Build and Package PVA (Push Trigger)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Native Dependencies
        run: |
          sudo apt-get update
          # Nur die nativen Libs und Tools installieren
          sudo apt-get install -y libjna-java libopencv-java libxerial-sqlite-jdbc-java sqlite3 espeak mbrola wget

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Execute Local Compile
        run: |
          # 1. Deine spezifische Saeuberung
          rm -f lib/PLACEHOLDER-* || true
          find . -name "*.class" -delete
          rm -f plugins/files/FirefoxHistoryPlugin.java || true
          rm -rf ollama || true

          # 2. Build-Zielordner gegen ZIP-Schreibfehler
          mkdir -p build_out

          # 3. Classpath: System-Libs + unsere frisch geladenen Legacy-Mails
          SYS_CP="/usr/share/java/opencv.jar:/usr/share/java/jna.jar:/usr/share/java/sqlite-jdbc.jar:./lib/javax.activation-1.2.0.jar:./lib/javax.mail-1.6.2.jar"
          
          # 4. Compile: Findet jetzt javax.mail in den geladenen JARs
          find . -name "*.java" > java_files.txt
          echo "CLASSPATH: $SYS_CP"
          javac -d build_out -cp "$SYS_CP:." @java_files.txt

          # 5. Klassen zurueckkopieren
          cp -r build_out/* .

      - name: Prepare Root Distribution (Staging)
        run: |
          mkdir -p deploy/etc deploy/usr/local/sbin deploy/usr/share/applications deploy/usr/share/pva deploy/var/lib/pva/records
          
          # Spezialitäten VERSCHIEBEN
          if [ -d etc/pva ]; then mv etc/pva deploy/etc/; fi
          if [ -d usr/local/sbin ]; then mv usr/local/sbin/* deploy/usr/local/sbin/ || true; fi
          if [ -d desktop ]; then mv desktop/*.desktop deploy/usr/share/applications/ || true; fi
          
          # Den Rest nach /usr/share/pva kopieren (inkl. lib_legacy für den User)
          find . -maxdepth 1 ! -name 'deploy' ! -name '.' -exec cp -r {} deploy/usr/share/pva/ \;
          rm -rf deploy/usr/share/pva/deploy deploy/usr/share/pva/.github deploy/usr/share/pva/.git

      - name: Create Final Tarball
        run: |
          cd deploy && tar -cvzf ../pva_root_install.tgz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pva-install-package
          path: pva_root_install.tgz
          
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pva_root_install.tgz
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Force Create Tag and Release
        run: |
          # 1. Lokal den Tag setzen (falls er fehlt)
          git tag -f latest
          # 2. Den Tag zum Server pushen (erzwingen)
          git push -f origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Development Build"
          files: pva_root_install.tgz
          # Das hier macht das Release auf der Startseite sichtbar:
          make_latest: true
          # Falls das Release existiert, wird es ueberschrieben:
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
