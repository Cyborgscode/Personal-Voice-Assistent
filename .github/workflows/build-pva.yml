name: Build and Package PVA (Using Custom Libs)

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies (Ubuntu Native)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libjakarta-mail-java \
            libjakarta-activation-java \
            libjna-java \
            libopencv-java \
            libxerial-sqlite-jdbc-java \
            sqlite3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Execute Local Compile
        run: |
          # 1. Defekten PLACEHOLDER im Workspace entfernen
          rm -f lib/PLACEHOLDER-* || true
          # remove Demo Plugin, which requires sqllite-jars
          rm -f plugins/files/FirefoxHistoryPlugin.java
          # 2. Den Ubuntu-Classpath zusammenbauen
          UBUNTU_CP="/usr/share/java/opencv.jar:/usr/share/java/jna.jar:/usr/share/java/jakarta.activation.jar:/usr/share/java/jakarta.mail.jar:/usr/share/java/sqlite-jdbc.jar"
          
          # 3. Dein Script mit den Argumenten füttern:
          # $1 = Pfad (.)
          # $2 = -withcustomlibs
          # $3 = Der zusammengestellte Classpath
          chmod +x compile.sh
          ./compile.sh . -withcustomlibs "$UBUNTU_CP" 2>&1

      - name: Prepare Root Distribution (Staging)
        run: |
          mkdir -p deploy/etc/pva deploy/usr/local/sbin deploy/usr/share/applications deploy/usr/share/pva deploy/var/lib/pva/records
          
          # Spezialitäten verschieben (Reihenfolge!)
          if [ -d etc/pva ]; then mv etc/pva deploy/etc/; fi
          if [ -d usr/local/sbin ]; then mv usr/local/sbin/* deploy/usr/local/sbin/ || true; fi
          if [ -d desktop ]; then mv desktop/*.desktop deploy/usr/share/applications/ || true; fi
          
          # Den Rest kopieren
          cp -r . deploy/usr/share/pva/
          rm -rf deploy/usr/share/pva/deploy deploy/usr/share/pva/.github deploy/usr/share/pva/.git

      - name: Create Final Tarball
        run: |
          cd deploy && tar -cvzf ../pva_root_install.tgz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pva-ready-to-install
          path: pva_root_install.tgz
