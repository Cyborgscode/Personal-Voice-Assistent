name: Build and Package PVA (Push Trigger)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Native Dependencies
        run: |
          sudo apt-get update
          # Nur die nativen Libs und Tools installieren
          sudo apt-get install -y libjna-java libopencv-java libxerial-sqlite-jdbc-java sqlite3 espeak mbrola wget

      - name: Download Legacy JavaMail (javax.mail)
        run: |
          # Wir laden die exakten JARs fuer den javax.mail Namensraum
          mkdir -p lib_legacy
          wget -q -O lib_legacy/javax.mail.jar https://maven.org
          wget -q -O lib_legacy/activation.jar https://maven.org

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Execute Local Compile
        run: |
          # 1. Deine spezifische Saeuberung
          rm -f lib/PLACEHOLDER-* || true
          find . -name "*.class" -delete
          rm -f plugins/files/FirefoxHistoryPlugin.java || true
          rm -rf ollama || true

          # 2. Build-Zielordner gegen ZIP-Schreibfehler
          mkdir -p build_out

          # 3. Classpath: System-Libs + unsere frisch geladenen Legacy-Mails
          LEGACY_CP="lib_legacy/javax.mail.jar:lib_legacy/activation.jar"
          SYS_CP="/usr/share/java/opencv.jar:/usr/share/java/jna.jar:/usr/share/java/sqlite-jdbc.jar"
          
          # 4. Compile: Findet jetzt javax.mail in den geladenen JARs
          find . -name "*.java" > java_files.txt
          javac -d build_out -cp "$LEGACY_CP:$SYS_CP:." @java_files.txt

          # 5. Klassen zurueckkopieren
          cp -r build_out/* .

      - name: Prepare Root Distribution (Staging)
        run: |
          mkdir -p deploy/etc deploy/usr/local/sbin deploy/usr/share/applications deploy/usr/share/pva deploy/var/lib/pva/records
          
          # Spezialitäten VERSCHIEBEN
          if [ -d etc/pva ]; then mv etc/pva deploy/etc/; fi
          if [ -d usr/local/sbin ]; then mv usr/local/sbin/* deploy/usr/local/sbin/ || true; fi
          if [ -d desktop ]; then mv desktop/*.desktop deploy/usr/share/applications/ || true; fi
          
          # Den Rest nach /usr/share/pva kopieren (inkl. lib_legacy für den User)
          cp -r . deploy/usr/share/pva/
          rm -rf deploy/usr/share/pva/deploy deploy/usr/share/pva/.github deploy/usr/share/pva/.git

      - name: Create Final Tarball
        run: |
          cd deploy && tar -cvzf ../pva_root_install.tgz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pva-install-package
          path: pva_root_install.tgz
