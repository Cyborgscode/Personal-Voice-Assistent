name: Daily Build and Package PVA (Java 17)

on:
  # 1. Zeitplan: Jeden Tag um 03:00 Uhr UTC (ca. 04:00 Uhr deutsche Zeit)
  schedule:
    - cron: '0 3 * * *'
  
  # 2. Manueller Trigger (Falls du doch mal sofort ein Paket brauchst)
  workflow_dispatch:

jobs:
  check_commits:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for commits in last 24h
        id: check
        run: |
          if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check_commits
    # Baut nur, wenn Commits da sind ODER du manuell auf "Run" drückst
    if: needs.check_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libjakarta-mail-java \
            libjakarta-activation-java \
            libjna-java \
            libopencv-java \
            libxerial-sqlite-jdbc-java \
            sqlite3 \
            espeak \
            mbrola

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Execute Local Compile
        run: |
          echo "JUST DO IT, DAMIT"
          # 1. Bereinigen
          rm -f lib/PLACEHOLDER-* || true
          find . -name "*.class" -delete
          rm -f plugins/files/FirefoxHistoryPlugin.java || true
          rm -rf ollama || true 
          # 2. Classpath definieren (Ubuntu Standard)
          UBUNTU_CP="/usr/share/java/opencv.jar:/usr/share/java/jna.jar:/usr/share/java/jakarta.activation.jar:/usr/share/java/jakarta.mail.jar:/usr/share/java/sqlite-jdbc.jar"
          
          # 3. Dein Script rufen
          chmod +x compile.sh
          ./compile.sh . -withcustomlibs "$UBUNTU_CP" 2>&1

      - name: Prepare Root Distribution (Staging)
        run: |
          mkdir -p deploy/etc deploy/usr/local/sbin deploy/usr/share/applications deploy/usr/share/pva deploy/var/lib/pva/records
          
          # Spezialitäten moven
          if [ -d etc/pva ]; then mv etc/pva deploy/etc/; fi
          if [ -d usr/local/sbin ]; then mv usr/local/sbin/* deploy/usr/local/sbin/ || true; fi
          if [ -d desktop ]; then mv desktop/*.desktop deploy/usr/share/applications/ || true; fi
          
          # Rest nach /usr/share/pva
          cp -r . deploy/usr/share/pva/
          rm -rf deploy/usr/share/pva/deploy deploy/usr/share/pva/.github deploy/usr/share/pva/.git

      - name: Create Final Tarball
        run: |
          cd deploy && tar -cvzf ../pva_root_install.tgz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pva-daily-package
          path: pva_root_install.tgz
