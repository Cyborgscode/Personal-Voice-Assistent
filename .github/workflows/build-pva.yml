name: Build and Package PVA (Push Trigger)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies (Legacy Compat)
        run: |
          sudo apt-get update
          # Installation der 1er Pakete für javax.mail Kompatibilität
          sudo apt-get install -y \
            libjakarta-mail1-java \
            libjakarta-activation1-java \
            libjna-java \
            libopencv-java \
            libxerial-sqlite-jdbc-java \
            sqlite3 \
            espeak \
            mbrola

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Execute Local Compile
        run: |
          # 1. Deine spezifische Saeuberung
          rm -f lib/PLACEHOLDER-* || true
          find . -name "*.class" -delete
          rm -f plugins/files/FirefoxHistoryPlugin.java || true
          rm -rf ollama || true

          # 2. Build-Zielordner gegen ZIP-Schreibfehler (ReadOnlyFileSystemException)
          mkdir -p build_out

          # 3. Classpath: Wir nutzen gezielt die jakarta-mail1 Pfade von Ubuntu
          MAIL_CP="/usr/share/java/jakarta-mail1/jakarta.mail.jar:/usr/share/java/jakarta-activation1/jakarta.activation.jar"
          SYS_CP="/usr/share/java/opencv.jar:/usr/share/java/jna.jar:/usr/share/java/sqlite-jdbc.jar"
          
          # 4. Compile: Sucht alle Java-Files und schreibt Klassen nach build_out
          find . -name "*.java" > java_files.txt
          javac -d build_out -cp "$MAIL_CP:$SYS_CP:." @java_files.txt

          # 5. Klassen zurueckkopieren fuer das Staging-Paket
          cp -r build_out/* .

      - name: Prepare Root Distribution (Staging)
        run: |
          mkdir -p deploy/etc deploy/usr/local/sbin deploy/usr/share/applications deploy/usr/share/pva deploy/var/lib/pva/records
          
          # Spezialitäten VERSCHIEBEN (Reihenfolge!)
          if [ -d etc/pva ]; then mv etc/pva deploy/etc/; fi
          if [ -d usr/local/sbin ]; then mv usr/local/sbin/* deploy/usr/local/sbin/ || true; fi
          if [ -d desktop ]; then mv desktop/*.desktop deploy/usr/share/applications/ || true; fi
          
          # Rest nach /usr/share/pva kopieren
          cp -r . deploy/usr/share/pva/
          
          # GitHub-Reste im Paket entfernen
          rm -rf deploy/usr/share/pva/deploy deploy/usr/share/pva/.github deploy/usr/share/pva/.git

      - name: Create Final Tarball
        run: |
          cd deploy && tar -cvzf ../pva_root_install.tgz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pva-install-package
          path: pva_root_install.tgz
